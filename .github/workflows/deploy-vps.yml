# Verify on GitHub, build Docker images on the VPS (BuildKit), recreate, smoke.
# Secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY_B64 (or VPS_SSH_KEY), optional VPS_PORT
# Server must have /srv/Inabiya/.env (gitignored).
name: Build and deploy VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-inabiya-vps
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # Prisma validate/generate need a URL shape; no live DB in CI
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Validate Prisma schema
        run: pnpm exec prisma validate --schema=prisma/schema.prisma

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit smoke
        run: pnpm test

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Sanitize VPS host/user/port
        env:
          RAW_HOST: ${{ secrets.VPS_HOST }}
          RAW_USER: ${{ secrets.VPS_USER }}
          RAW_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -euo pipefail
          H="$RAW_HOST"; U="$RAW_USER"; P="${RAW_PORT:-}"
          H="${H//$'\r'/}"; H="${H//$'\n'/}"
          U="${U//$'\r'/}"; U="${U//$'\n'/}"
          P="${P//$'\r'/}"; P="${P//$'\n'/}"
          H="${H#https://}"; H="${H#http://}"; H="${H%%/*}"
          H="$(echo -n "$H" | xargs)"; U="$(echo -n "$U" | xargs)"; P="$(echo -n "$P" | xargs)"
          if [ -z "$P" ]; then P="22"; fi
          if [ -z "$H" ] || [ -z "$U" ]; then
            echo "::error::VPS_HOST or VPS_USER empty"; exit 1
          fi
          echo "VPS_HOST_CLEAN=$H" >> "$GITHUB_ENV"
          echo "VPS_USER_CLEAN=$U" >> "$GITHUB_ENV"
          echo "VPS_PORT_CLEAN=$P" >> "$GITHUB_ENV"

      - name: Load SSH key
        env:
          KEY_B64: ${{ secrets.VPS_SSH_KEY_B64 }}
          KEY_RAW: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh; chmod 700 ~/.ssh
          KEYFILE="$HOME/.ssh/vps_deploy.pem"; RAWTMP="$HOME/.ssh/vps_tmp.pem"
          if [ -n "${KEY_B64:-}" ]; then echo "$KEY_B64" | tr -d '\n\r\t ' | base64 -d > "$RAWTMP"
          elif [ -n "${KEY_RAW:-}" ]; then printf '%s\n' "$KEY_RAW" | tr -d '\r' > "$RAWTMP"
          else echo "::error::Set VPS_SSH_KEY_B64 or VPS_SSH_KEY"; exit 1; fi
          awk '/-----BEGIN/{found=1} found{print}' "$RAWTMP" > "$KEYFILE"; rm -f "$RAWTMP"
          chmod 600 "$KEYFILE"
          eval "$(ssh-agent -s)"; ssh-add "$KEYFILE"
          echo "SSH_AUTH_SOCK=${SSH_AUTH_SOCK}" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=${SSH_AGENT_PID}" >> "$GITHUB_ENV"

      - name: Deploy on VPS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh; touch ~/.ssh/known_hosts
          ssh-keyscan -p "$VPS_PORT_CLEAN" -H "$VPS_HOST_CLEAN" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh_opts=(-p "$VPS_PORT_CLEAN" -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 -o ServerAliveInterval=15 -o ServerAliveCountMax=3)
          retry_ssh() {
            local max_attempts=4 delay_seconds=5 attempt=1
            while true; do
              if "$@"; then return 0; fi
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "::error::Command failed after ${max_attempts} attempts: $*"; return 1
              fi
              echo "Attempt ${attempt}/${max_attempts} failed; retrying in ${delay_seconds}s..."
              sleep "$delay_seconds"; attempt=$((attempt + 1))
            done
          }
          if ! timeout 15 bash -lc "cat </dev/null >/dev/tcp/${VPS_HOST_CLEAN}/${VPS_PORT_CLEAN}" 2>/dev/null; then
            echo "::error::Cannot reach ${VPS_HOST_CLEAN}:${VPS_PORT_CLEAN} from the GitHub runner."
            exit 1
          fi
          retry_ssh ssh "${ssh_opts[@]}" "${VPS_USER_CLEAN}@${VPS_HOST_CLEAN}" \
            env GH_TOKEN="$GH_TOKEN" GH_REPO="$GH_REPO" GH_SHA="$GH_SHA" \
            bash -s <<'REMOTE'
          set -euo pipefail
          REPO="/srv/Inabiya"

          if [ ! -d "$REPO/.git" ]; then
            mkdir -p "$(dirname "$REPO")"
            git clone --depth 1 --branch main "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git" "$REPO"
          fi
          cd "$REPO"
          BEFORE="$(git rev-parse HEAD 2>/dev/null || echo "")"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git"
          git fetch origin main
          git checkout main
          git reset --hard origin/main

          if [ ! -f "$REPO/.env" ]; then
            echo "::error::Missing $REPO/.env on the VPS. Create it before deploy (see .env.example)."
            exit 1
          fi

          export DEPLOY_BEFORE_SHA="$BEFORE"
          export FORCE_ALL=0
          # First deploy or empty before → rebuild all
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "$(git rev-parse HEAD)" ]; then
            # same SHA can happen on workflow_dispatch re-run; still rebuild apps if images missing
            if ! docker image inspect "inabiya-api:$(git rev-parse --short HEAD)" >/dev/null 2>&1; then
              export FORCE_ALL=1
            fi
          fi

          bash "$REPO/scripts/deploy-vps.sh"
          REMOTE
