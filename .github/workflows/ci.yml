name: CI

on:
  pull_request:
  push:
    branches-ignore: [main]

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    env:
      # Prisma validate/generate need a URL shape; no live DB in CI
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Validate Prisma schema
        run: pnpm exec prisma validate --schema=prisma/schema.prisma

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit smoke
        run: pnpm test
